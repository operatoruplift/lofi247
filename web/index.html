<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0e0b22">
  <meta name="description" content="LOFI 247 — a 24/7 lofi radio stream. Warm beats, dusk skies, always on.">
  <title>LOFI 247 — beats till sunrise</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Ccircle%20cx='8'%20cy='8'%20r='6.5'%20fill='%23f2a65a'/%3E%3Ccircle%20cx='8'%20cy='8'%20r='2.4'%20fill='%230e0b22'/%3E%3C/svg%3E">

<body>

      <rect class="antenna" x="222" y="42" width="4" height="48"/>
      <circle class="beacon" cx="224" cy="40" r="3"/>
      <g class="windows">
        <rect class="win" x="182" y="105" width="10" height="6"/>

        <rect class="win dim" x="206" y="145" width="10" height="6"/>
        <rect class="win" x="254" y="145" width="10" height="6"/>
        <rect class="win" x="182" y="165" width="10" height="6"/>
        <rect class="win dim" x="230" y="165" width="10" height="6"/>
        <rect class="win" x="272" y="185" width="10" height="6"/>
        <rect class="win dim" x="206" y="205" width="10" height="6"/>
        <rect class="win" x="476" y="126" width="10" height="6"/>
        <rect class="win dim" x="500" y="126" width="10" height="6"/>
        <rect class="win" x="520" y="146" width="10" height="6"/>

        <rect class="win" x="826" y="135" width="10" height="6"/>
        <rect class="win dim" x="870" y="135" width="10" height="6"/>

        <rect class="win dim" x="846" y="155" width="10" height="6"/>
        <rect class="win" x="894" y="155" width="10" height="6"/>
        <rect class="win dim" x="826" y="175" width="10" height="6"/>
        <rect class="win" x="870" y="175" width="10" height="6"/>
        <rect class="win" x="1126" y="136" width="10" height="6"/>
        <rect class="win dim" x="1174" y="136" width="10" height="6"/>
        <rect class="win" x="1222" y="136" width="10" height="6"/>

        <rect class="win dim" x="1222" y="176" width="10" height="6"/>
      </g>
    </svg>

  </div>

  <!-- VHS texture over everything (decorative, pointer-inert) -->
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header">
    <p class="badge-live" id="live-badge" role="status">
      <span class="dot" aria-hidden="true"></span>
      <span class="badge-label" id="live-label">live</span>
    </p>
    <!-- Set data-x-handle to the station's X handle (no @) and the link resolves itself. -->
    <a class="x-link" id="x-link" href="https://x.com/" data-x-handle="" target="_blank" rel="noopener">
      watch on&nbsp;X <span class="x-arrow" aria-hidden="true">&#8599;</span>
    </a>
  </header>

  <main>
    <section class="stage" aria-labelledby="station-title">
      <h1 class="wordmark" id="station-title">
        <span class="wordmark-lofi">LOFI</span><span class="wordmark-247">247</span>
      </h1>
      <p class="tagline">low&#8209;fi radio &middot; from a window above the city &middot; always on</p>

      <div class="player">
        <div class="now-playing">
          <p class="np-label">now playing</p>
          <div class="np-track" id="np-track">
            <p class="np-text" id="np-text" aria-live="polite">LOFI 247 &mdash; warming up the tape deck&hellip;</p>
          </div>
        </div>

        <canvas class="viz" id="viz" width="1120" height="176" role="img" aria-label="Live audio visualizer"></canvas>

        <div class="controls">
          <button class="btn-play" id="btn-play" type="button" aria-label="Play" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true" focusable="false">
              <path class="icon-play" d="M8.2 5.3v13.4c0 .8.9 1.3 1.6.9l10.5-6.7c.6-.4.6-1.4 0-1.8L9.8 4.4c-.7-.4-1.6.1-1.6.9z"/>
              <g class="icon-pause">
                <rect x="6.6" y="5" width="3.8" height="14" rx="1.2"/>
                <rect x="13.6" y="5" width="3.8" height="14" rx="1.2"/>
              </g>
            </svg>
          </button>

          <div class="control-copy">
            <p class="play-hint" id="play-hint">press play to tune in</p>
            <p class="key-hints" aria-hidden="true"><kbd>space</kbd> play &middot; <kbd>&uarr;</kbd><kbd>&darr;</kbd> volume</p>
          </div>

          <div class="vol-group" role="group" aria-label="Volume controls">
            <button class="btn-mute" id="btn-mute" type="button" aria-label="Mute" aria-pressed="false">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                <path class="icon-speaker" d="M4 9.4v5.2c0 .6.4 1 1 1h2.6l4.2 3.4c.7.5 1.6 0 1.6-.8V5.8c0-.8-1-1.3-1.6-.8L7.6 8.4H5c-.6 0-1 .4-1 1z"/>
                <g class="icon-waves">
                  <path d="M16 9.2a4.3 4.3 0 0 1 0 5.6"/>
                  <path d="M18.4 7a7.6 7.6 0 0 1 0 10"/>
                </g>
                <g class="icon-slash">
                  <path d="M16.2 9.6l4.8 4.8"/>
                  <path d="M21 9.6l-4.8 4.8"/>
                </g>
              </svg>
            </button>
            <input class="vol-slider" id="vol" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
          </div>
        </div>
      </div>

      <audio id="radio-audio" src="/radio" preload="none"></audio>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      <span class="foot-mark">LOFI&nbsp;247</span>
      <span class="foot-sep">&middot;</span>
      <span id="status-line">signal nominal</span>
      <span class="foot-sep">&middot;</span>
      <span class="foot-note">liquidsoap &rarr; icecast &rarr; your window</span>
    </p>
  </footer>

  <noscript>
    <p class="noscript-note">JavaScript is off &mdash; the stream still works: open <a href="/radio">/radio</a> in your audio player.</p>
  </noscript>

  <script src="player.js"></script>
</body>
</html>
