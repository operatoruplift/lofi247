# CI-only overrides: adds a dummy RTMP sink on the compose network so the
# streamer has something real to push to. CI assertions run against the web
# service's :8080 surface (/radio proxy + /nowplaying.json), not icecast.
# Used as: docker compose -f docker-compose.yml -f docker-compose.ci.yml ...
services:
  rtmp-sink:
    image: alpine:3.22
    restart: unless-stopped
    command:
      - sh
      - -ec
      - |
        apk add -q ffmpeg
        while :; do
          ffmpeg -hide_banner -loglevel warning -listen 1 -f flv \
            -i rtmp://0.0.0.0:1935/x/ci-test -t 10 -f null - \
            && echo SINK_GOT_STREAM || true
          sleep 1
        done
