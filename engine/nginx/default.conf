# LOFI 247 web player — static site, same-origin audio proxy, now-playing JSON.

server {
    listen 80;
    server_name _;
    server_tokens off;

    # Re-resolve container hostnames via Docker's embedded DNS; a plain
    # proxy_pass hostname is resolved once at startup and 502s forever after
    # the icecast container is recreated with a new IP.
    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # Basic security headers. The site is fully self-contained (same-origin
    # scripts/fetch/audio, data: favicon), so a strict CSP costs nothing.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; media-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # Compress text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Now-playing metadata written by liquidsoap into the shared volume.
    location = /nowplaying.json {
        alias /data/nowplaying.json;
        default_type application/json;
        # A location-level add_header drops inherited headers; restate them.
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; media-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Same-origin audio stream so the Web Audio API needs no CORS setup.
    # Variable upstream forces per-request DNS re-resolution (see resolver);
    # exact-match location because variable proxy_pass appends no suffix.
    location = /radio {
        set $icecast_upstream http://icecast:8000;
        proxy_pass $icecast_upstream/radio;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        # The stream is endless; don't let proxy timeouts cut listeners off.
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
